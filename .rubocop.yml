inherit_from: .rubocop_todo.yml

# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

# Exclude personal scripts and files from RuboCop checks
AllCops:
  Exclude:
    - 'personal/**/*'

# Overwrite or add rules to create your own house style
#
# Use `[a, [b, c]]` not `[ a, [ b, c ] ]`
Layout/SpaceInsideArrayLiteralBrackets:
  Enabled: false

# Auto-correctable formatting rules
Layout/TrailingWhitespace:
  Enabled: true
  AutoCorrect: true

Layout/TrailingEmptyLines:
  Enabled: true
  AutoCorrect: true
  EnforcedStyle: final_newline

Layout/EmptyLineAfterGuardClause:
  Enabled: true
  AutoCorrect: true

Layout/EmptyLinesAroundBlockBody:
  Enabled: true
  AutoCorrect: true

# Increase line length for readability (Rails default is often 120)
Layout/LineLength:
  Enabled: true
  Max: 120
  AllowedPatterns: ['\A#']  # Allow long comments
  AutoCorrect: true

# Ensure consistent string literals
Style/StringLiterals:
  Enabled: true
  AutoCorrect: true
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  Enabled: true
  AutoCorrect: true
  EnforcedStyle: double_quotes

# Frozen string literal comment
Style/FrozenStringLiteralComment:
  Enabled: false  # Not required in Ruby 3+

# Method definition spacing
Layout/EmptyLinesAroundMethodBody:
  Enabled: true
  AutoCorrect: true

# Alignment for multi-line method arguments
Layout/ArgumentAlignment:
  Enabled: true
  AutoCorrect: true
  EnforcedStyle: with_fixed_indentation

# Force line break after opening parenthesis for multi-line calls
Layout/FirstArgumentIndentation:
  Enabled: true
  AutoCorrect: true
  EnforcedStyle: consistent

# Each argument on its own line for multi-line method calls
Layout/FirstMethodArgumentLineBreak:
  Enabled: true
  AutoCorrect: true

# Closing parenthesis on its own line for multi-line method calls
Layout/MultilineMethodCallBraceLayout:
  Enabled: true
  AutoCorrect: true
  EnforcedStyle: new_line

# Align closing parenthesis with start of line that opened it
Layout/ClosingParenthesisIndentation:
  Enabled: true
  AutoCorrect: true

# Alignment for multi-line method parameters
Layout/ParameterAlignment:
  Enabled: true
  AutoCorrect: true
  EnforcedStyle: with_first_parameter

# Block delimiters: use do...end for multi-line blocks, {...} for single-line
# For RSpec expect blocks, prefer {...} even for multi-line
Style/BlockDelimiters:
  Enabled: true
  AutoCorrect: true
  EnforcedStyle: line_count_based
  BracesRequiredMethods:
    - expect

# Indentation rules
Layout/IndentationWidth:
  Enabled: true
  AutoCorrect: true
  Width: 2

Layout/IndentationConsistency:
  Enabled: true
  AutoCorrect: true
  EnforcedStyle: normal

Layout/EndAlignment:
  Enabled: true
  AutoCorrect: true
  EnforcedStyleAlignWith: start_of_line

# Put end statement of multiline block on its own line
Layout/BlockEndNewline:
  Enabled: true
  AutoCorrect: true

# Align end with the start of the line that opened the block
Layout/BlockAlignment:
  Enabled: true
  AutoCorrect: true

# Ensure newlines after multiline block do statements
Layout/MultilineBlockLayout:
  Enabled: true
  AutoCorrect: true
